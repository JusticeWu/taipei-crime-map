services:
  postgres:
    image: postgres:16-alpine
    container_name: taipei-crime-map-db
    environment:
      POSTGRES_DB: taipei_crime_map
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: