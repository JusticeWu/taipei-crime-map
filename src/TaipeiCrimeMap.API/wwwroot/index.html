<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台北市治安地圖</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <!-- Mobile filter bar (mobile only) -->
    <button id="btn-filter-toggle" type="button">篩選條件  ▼</button>

    <!-- Left Panel -->
    <aside id="left-panel">

      <!-- Filter Panel -->
      <section id="filter-panel">
        <div class="filter-panel-header">
          <h2 class="panel-title">篩選條件</h2>
          <button id="btn-filter-close" type="button" aria-label="關閉篩選條件">✕</button>
        </div>

        <div class="form-group">
          <label for="select-case-type">案類</label>
          <select id="select-case-type">
            <option value="">全部</option>
            <option value="1">住宅竊盜</option>
            <option value="2">汽車竊盜</option>
            <option value="3">機車竊盜</option>
            <option value="4">自行車竊盜</option>
            <option value="5">搶奪</option>
            <option value="6">強盜</option>
          </select>
        </div>

        <div class="form-group">
          <label for="select-district">行政區</label>
          <select id="select-district">
            <option value="">全部</option>
            <option value="松山區">松山區</option>
            <option value="信義區">信義區</option>
            <option value="大安區">大安區</option>
            <option value="中山區">中山區</option>
            <option value="中正區">中正區</option>
            <option value="大同區">大同區</option>
            <option value="萬華區">萬華區</option>
            <option value="文山區">文山區</option>
            <option value="南港區">南港區</option>
            <option value="內湖區">內湖區</option>
            <option value="士林區">士林區</option>
            <option value="北投區">北投區</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group half">
            <label for="input-year-from">起始年份</label>
            <input
              type="number"
              id="input-year-from"
              min="2015"
              placeholder="2015"
            />
          </div>
          <div class="form-group half">
            <label for="input-year-to">結束年份</label>
            <input
              type="number"
              id="input-year-to"
              min="2015"
              placeholder="2024"
            />
          </div>
        </div>

        <div class="form-group">
          <label class="label-block">顯示模式</label>
          <div class="toggle-group" id="toggle-mode">
            <label class="toggle-option">
              <input type="radio" name="display-mode" value="heat" />
              <span>熱力圖</span>
            </label>
            <label class="toggle-option">
              <input type="radio" name="display-mode" value="point" checked />
              <span>點位圖</span>
            </label>
          </div>
        </div>

        <button id="btn-query" type="button">查詢</button>
      </section>

      <!-- Stats Panel -->
      <section id="stats-panel">
        <h2 class="panel-title">統計資訊</h2>
        <div class="stat-grid">
          <div class="stat-item">
            <span class="stat-label">總筆數</span>
            <span class="stat-value" id="stat-total">—</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">有座標筆數</span>
            <span class="stat-value" id="stat-with-coords">—</span>
          </div>
        </div>
      </section>

      <!-- Top District Panel -->
      <section id="top-district-panel">
        <div class="stat-grid">
          <div class="stat-item stat-item--full">
            <span class="stat-label">最多案件行政區</span>
            <span class="stat-value" id="stat-top-district">—</span>
          </div>
        </div>
      </section>

      <!-- Chart Container (desktop only) -->
      <section id="chart-container">
        <div class="chart-wrapper">
          <h3 class="chart-title">時段分布</h3>
          <canvas id="chart-timeslot"></canvas>
        </div>
        <div class="chart-wrapper">
          <h3 class="chart-title">行政區分布</h3>
          <canvas id="chart-district"></canvas>
        </div>
      </section>

    </aside>

    <!-- Right: Map -->
    <main id="map-container">
      <div id="map"></div>
    </main>
  </div>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="hidden">
    <div class="spinner"></div>
    <p>載入中…</p>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="js/map.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
