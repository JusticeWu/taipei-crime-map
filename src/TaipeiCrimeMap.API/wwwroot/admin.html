<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理後台 — 台北市治安地圖</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body {
      font-family: -apple-system, "Segoe UI", "Noto Sans TC", sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 16px;
      color: #222;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-weight: 600;
      margin-top: 1rem;
      margin-bottom: 0.25rem;
    }
    input[type="text"],
    input[type="password"],
    input[type="number"],
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 0.5rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    textarea {
      min-height: 6rem;
      font-family: inherit;
      resize: vertical;
    }
    .hint {
      color: #666;
      font-size: 0.85rem;
      margin-top: 0.25rem;
    }
    button {
      margin-top: 1.25rem;
      padding: 0.6rem 1.25rem;
      font-size: 1rem;
      border: none;
      border-radius: 4px;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
    }
    button:hover {
      background: #1d4ed8;
    }
    #btn-logout {
      background: #6b7280;
      margin-left: 0.5rem;
    }
    #btn-logout:hover {
      background: #4b5563;
    }
    .error {
      color: #dc2626;
      margin-top: 0.5rem;
    }
    #result {
      margin-top: 1.25rem;
      padding: 0.75rem;
      border-radius: 4px;
      background: #f3f4f6;
      font-size: 0.9rem;
      white-space: pre-wrap;
    }
    #result:empty {
      display: none;
    }
    [hidden] {
      display: none !important;
    }

    /* Tab bar */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    .section-header h1 {
      margin: 0;
    }
    .section-header #btn-logout {
      margin-top: 0;
    }
    .tab-bar {
      display: flex;
      border-bottom: 2px solid #e5e7eb;
      margin-bottom: 1.25rem;
    }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      margin-top: 0;
      padding: 0.5rem 1.25rem;
      font-size: 0.95rem;
      color: #6b7280;
      cursor: pointer;
      border-radius: 0;
    }
    .tab-btn:hover {
      background: none;
      color: #2563eb;
    }
    .tab-btn.active {
      color: #2563eb;
      border-bottom-color: #2563eb;
    }

    /* Per-server blocks */
    #server-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 1.25rem; }
    .server-block {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
      transition: opacity 0.3s;
    }
    .server-block.offline { opacity: 0.45; }
    .server-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #f9fafb;
      border-bottom: 1px solid #e5e7eb;
    }
    .server-name {
      font-weight: 700;
      font-size: 0.9rem;
      font-family: monospace;
      color: #111;
      flex: 1;
    }
    .env-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 10px;
      text-transform: uppercase;
    }
    .env-production { background: #dcfce7; color: #15803d; }
    .env-staging, .env-uat { background: #fef9c3; color: #a16207; }
    .env-development { background: #e0f2fe; color: #0369a1; }
    .env-unknown { background: #f3f4f6; color: #6b7280; }
    .online-dot { font-size: 0.75rem; }
    .online-dot.online { color: #16a34a; }
    .online-dot.offline { color: #9ca3af; }
    .sm-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1px;
      background: #e5e7eb;
    }
    @media (max-width: 520px) {
      .sm-row { grid-template-columns: repeat(3, 1fr); }
    }
    .sm-cell {
      padding: 8px 10px;
      background: #fff;
      text-align: center;
    }
    .sm-label {
      font-size: 0.68rem;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 3px;
    }
    .sm-val {
      font-size: 1rem;
      font-weight: 700;
      color: #111;
    }
    .hw-info {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 16px;
      margin-bottom: 1rem;
      padding: 8px 12px;
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 6px;
      font-size: 0.82rem;
      color: #374151;
    }
    .hw-item b { color: #0369a1; margin-right: 4px; }
    .ws-status {
      font-size: 0.8rem;
      color: #9ca3af;
      margin-bottom: 0.75rem;
    }
    .ws-status.connected { color: #16a34a; }
    .ws-status.error { color: #dc2626; }
    .chart-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
    }
    .chart-box canvas {
      display: block;
      width: 100% !important;
      max-height: 240px;
    }
  </style>
</head>
<body>
  <section id="login-section">
    <h1>座標管理</h1>
    <p>請輸入管理帳號密碼登入。</p>
    <form id="login-form">
      <label for="login-username">帳號</label>
      <input type="text" id="login-username" name="username" autocomplete="username" required />

      <label for="login-password">密碼</label>
      <input type="password" id="login-password" name="password" autocomplete="current-password" required />

      <button type="submit">登入</button>
      <div class="error" id="login-error"></div>
    </form>
  </section>

  <section id="form-section" hidden>
    <div class="section-header">
      <h1>管理後台</h1>
      <button type="button" id="btn-logout">登出</button>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="maintenance">資料維護</button>
      <button class="tab-btn" data-tab="monitor">伺服器監控</button>
    </div>

    <!-- Tab: 資料維護 -->
    <div id="tab-maintenance" class="tab-panel">
      <form id="update-form">
        <label for="rawLocation">發生地點</label>
        <textarea id="rawLocation" name="rawLocation" required
          placeholder="單筆：輸入地點，搭配下方緯度／經度&#10;批次：每行一筆，格式為「地點,緯度,經度」"></textarea>
        <div class="hint">
          單筆更新：輸入一行地點，並填寫下方緯度／經度。<br />
          批次更新：每行一筆，格式為「地點,緯度,經度」，多行時會逐筆送出。
        </div>

        <label for="latitude">緯度（單筆更新用，-90 ~ 90）</label>
        <input type="number" id="latitude" name="latitude" step="any" min="-90" max="90" />

        <label for="longitude">經度（單筆更新用，-180 ~ 180）</label>
        <input type="number" id="longitude" name="longitude" step="any" min="-180" max="180" />

        <button type="submit">更新座標</button>
        <button type="button" id="btn-clear-cache">清除快取</button>
      </form>

      <div id="result"></div>
    </div>

    <!-- Tab: 伺服器監控 -->
    <div id="tab-monitor" class="tab-panel" style="display:none">
      <p class="ws-status" id="ws-status">⬤ 未連線</p>

      <!-- 靜態硬體資訊列（第一次收到資料後顯示，顯示自機資訊） -->
      <div class="hw-info" id="hw-info" style="display:none">
        <span class="hw-item"><b>CPU 核心</b><span id="hw-cores">—</span></span>
        <span class="hw-item"><b>總記憶體</b><span id="hw-total-mem">—</span></span>
        <span class="hw-item"><b>OS</b><span id="hw-os">—</span></span>
        <span class="hw-item"><b>.NET</b><span id="hw-dotnet">—</span></span>
      </div>

      <!-- 每台 Server 動態生成卡片 -->
      <div id="server-list"></div>

      <div class="chart-box">
        <p style="margin:0 0 6px;font-size:0.82rem;color:#6b7280">CPU 趨勢（所有伺服器，最近 60s）</p>
        <canvas id="metrics-chart"></canvas>
      </div>
    </div>
  </section>

  <script src="js/admin.js"></script>
</body>
</html>
