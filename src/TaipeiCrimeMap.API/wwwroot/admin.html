<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理後台 — 台北市治安地圖</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body {
      font-family: -apple-system, "Segoe UI", "Noto Sans TC", sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 16px;
      color: #222;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-weight: 600;
      margin-top: 1rem;
      margin-bottom: 0.25rem;
    }
    input[type="text"],
    input[type="password"],
    input[type="number"],
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 0.5rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    textarea {
      min-height: 6rem;
      font-family: inherit;
      resize: vertical;
    }
    .hint {
      color: #666;
      font-size: 0.85rem;
      margin-top: 0.25rem;
    }
    button {
      margin-top: 1.25rem;
      padding: 0.6rem 1.25rem;
      font-size: 1rem;
      border: none;
      border-radius: 4px;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
    }
    button:hover {
      background: #1d4ed8;
    }
    #btn-logout {
      background: #6b7280;
      margin-left: 0.5rem;
    }
    #btn-logout:hover {
      background: #4b5563;
    }
    .error {
      color: #dc2626;
      margin-top: 0.5rem;
    }
    #result {
      margin-top: 1.25rem;
      padding: 0.75rem;
      border-radius: 4px;
      background: #f3f4f6;
      font-size: 0.9rem;
      white-space: pre-wrap;
    }
    #result:empty {
      display: none;
    }
    [hidden] {
      display: none !important;
    }

    /* Tab bar */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    .section-header h1 {
      margin: 0;
    }
    .section-header #btn-logout {
      margin-top: 0;
    }
    .tab-bar {
      display: flex;
      border-bottom: 2px solid #e5e7eb;
      margin-bottom: 1.25rem;
    }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      margin-top: 0;
      padding: 0.5rem 1.25rem;
      font-size: 0.95rem;
      color: #6b7280;
      cursor: pointer;
      border-radius: 0;
    }
    .tab-btn:hover {
      background: none;
      color: #2563eb;
    }
    .tab-btn.active {
      color: #2563eb;
      border-bottom-color: #2563eb;
    }

    /* Per-server blocks */
    #server-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 1.25rem; }
    .server-block {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
      transition: opacity 0.3s;
    }
    .server-block.offline { opacity: 0.45; }
    .server-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #f9fafb;
      border-bottom: 1px solid #e5e7eb;
    }
    .server-name {
      font-weight: 700;
      font-size: 0.9rem;
      font-family: monospace;
      color: #111;
      flex: 1;
    }
    .env-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 10px;
      text-transform: uppercase;
    }
    .env-production { background: #dcfce7; color: #15803d; }
    .env-staging, .env-uat { background: #fef9c3; color: #a16207; }
    .env-development { background: #e0f2fe; color: #0369a1; }
    .env-unknown { background: #f3f4f6; color: #6b7280; }
    .online-dot { font-size: 0.75rem; }
    .online-dot.online { color: #16a34a; }
    .online-dot.offline { color: #9ca3af; }
    .sm-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1px;
      background: #e5e7eb;
    }
    @media (max-width: 520px) {
      .sm-row { grid-template-columns: repeat(3, 1fr); }
    }
    .sm-cell {
      padding: 8px 10px;
      background: #fff;
      text-align: center;
    }
    .sm-label {
      font-size: 0.68rem;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 3px;
    }
    .sm-val {
      font-size: 1rem;
      font-weight: 700;
      color: #111;
    }
    .hw-info {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 16px;
      margin-bottom: 1rem;
      padding: 8px 12px;
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 6px;
      font-size: 0.82rem;
      color: #374151;
    }
    .hw-item b { color: #0369a1; margin-right: 4px; }
    .ws-status {
      font-size: 0.8rem;
      color: #9ca3af;
      margin-bottom: 0.75rem;
    }
    .ws-status.connected { color: #16a34a; }
    .ws-status.error { color: #dc2626; }
    .chart-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
    }
    .chart-box canvas {
      display: block;
      width: 100% !important;
      max-height: 240px;
    }
  </style>
</head>
<body>
  <section id="login-section">
    <h1>座標管理</h1>
    <p>請輸入管理帳號密碼登入。</p>
    <form id="login-form">
      <label for="login-username">帳號</label>
      <input type="text" id="login-username" name="username" autocomplete="username" required />

      <label for="login-password">密碼</label>
      <input type="password" id="login-password" name="password" autocomplete="current-password" required />

      <button type="submit">登入</button>
      <div class="error" id="login-error"></div>
    </form>
  </section>

  <section id="form-section" hidden>
    <div class="section-header">
      <h1>管理後台</h1>
      <button type="button" id="btn-logout">登出</button>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="monitor">伺服器監控</button>
      <button class="tab-btn" data-tab="maintenance">座標更新</button>
      <button class="tab-btn" data-tab="bulk-add">資料新增</button>
      <button class="tab-btn" data-tab="data-edit">資料更新</button>
    </div>

    <!-- Tab: 座標更新 -->
    <div id="tab-maintenance" class="tab-panel" style="display:none">
      <form id="update-form">
        <label for="rawLocation">發生地點</label>
        <textarea id="rawLocation" name="rawLocation" required
          placeholder="單筆：輸入地點，搭配下方緯度／經度&#10;批次：每行一筆，格式為「地點,緯度,經度」"></textarea>
        <div class="hint">
          單筆更新：輸入一行地點，並填寫下方緯度／經度。<br />
          批次更新：每行一筆，格式為「地點,緯度,經度」，多行時會逐筆送出。
        </div>

        <label for="latitude">緯度（單筆更新用，-90 ~ 90）</label>
        <input type="number" id="latitude" name="latitude" step="any" min="-90" max="90" />

        <label for="longitude">經度（單筆更新用，-180 ~ 180）</label>
        <input type="number" id="longitude" name="longitude" step="any" min="-180" max="180" />

        <button type="submit">更新座標</button>
        <button type="button" id="btn-clear-cache">清除快取</button>
      </form>

      <div id="result"></div>
    </div>

    <!-- Tab: 資料新增 -->
    <div id="tab-bulk-add" class="tab-panel" style="display:none">
      <p class="hint">
        格式：tab 分隔，欄位依序為「編號  案類  發生日期  發生時段  發生地點」<br>
        範例：<code>12345	住宅竊盜	1150329	06~08	臺北市大安區忠孝東路四段</code>
      </p>
      <label for="bulk-input">貼上資料</label>
      <textarea id="bulk-input" rows="8" placeholder="12345	住宅竊盜	1150329	06~08	臺北市大安區忠孝東路四段&#10;12346	機車竊盜	1150401	10~12	臺北市中山區南京東路二段"></textarea>
      <button type="button" id="btn-bulk-preview">預覽</button>

      <div id="bulk-preview-area" style="display:none">
        <table id="bulk-preview-table" style="width:100%;border-collapse:collapse;margin-top:0.75rem;font-size:0.85rem">
          <thead>
            <tr style="background:#f3f4f6;text-align:left">
              <th style="padding:4px 8px;border:1px solid #e5e7eb">#</th>
              <th style="padding:4px 8px;border:1px solid #e5e7eb">編號</th>
              <th style="padding:4px 8px;border:1px solid #e5e7eb">案類</th>
              <th style="padding:4px 8px;border:1px solid #e5e7eb">發生日期</th>
              <th style="padding:4px 8px;border:1px solid #e5e7eb">發生時段</th>
              <th style="padding:4px 8px;border:1px solid #e5e7eb">發生地點</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <button type="button" id="btn-bulk-submit" style="margin-top:0.75rem">送出</button>
      </div>

      <div id="bulk-result"></div>
    </div>

    <!-- Tab: 資料更新 -->
    <div id="tab-data-edit" class="tab-panel" style="display:none">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:0.75rem">
        <select id="de-case-type" style="padding:4px"><option value="">全部案類</option>
          <option value="1">住宅竊盜</option><option value="2">汽車竊盜</option><option value="3">機車竊盜</option>
          <option value="4">自行車竊盜</option><option value="5">搶奪</option><option value="6">強盜</option>
        </select>
        <select id="de-district" style="padding:4px"><option value="">全部行政區</option>
          <option>松山區</option><option>信義區</option><option>大安區</option><option>中山區</option>
          <option>中正區</option><option>大同區</option><option>萬華區</option><option>文山區</option>
          <option>南港區</option><option>內湖區</option><option>士林區</option><option>北投區</option>
        </select>
        <select id="de-sort-by" style="padding:4px">
          <option value="caseNumber">依編號</option><option value="occurrenceDate">依日期</option><option value="district">依行政區</option>
        </select>
        <select id="de-sort-order" style="padding:4px">
          <option value="asc">升序</option><option value="desc">降序</option>
        </select>
        <button type="button" id="btn-de-query" style="padding:4px 12px">查詢</button>
        <button type="button" id="btn-de-clear-cache" style="padding:4px 12px;background:#6b7280;color:#fff;border:none;border-radius:4px;cursor:pointer">清除快取</button>
      </div>
      <div id="de-status" class="hint"></div>
      <table id="de-table" style="width:100%;border-collapse:collapse;font-size:0.82rem">
        <thead><tr style="background:#f3f4f6;text-align:left">
          <th style="padding:4px 6px;border:1px solid #e5e7eb">編號</th>
          <th style="padding:4px 6px;border:1px solid #e5e7eb">案類</th>
          <th style="padding:4px 6px;border:1px solid #e5e7eb">發生日期</th>
          <th style="padding:4px 6px;border:1px solid #e5e7eb">發生時段</th>
          <th style="padding:4px 6px;border:1px solid #e5e7eb">發生地點</th>
          <th style="padding:4px 6px;border:1px solid #e5e7eb">座標</th>
          <th style="padding:4px 6px;border:1px solid #e5e7eb">操作</th>
        </tr></thead>
        <tbody id="de-tbody"></tbody>
      </table>
      <div style="margin-top:0.5rem;display:flex;gap:8px;align-items:center">
        <button type="button" id="btn-de-prev" disabled>上一頁</button>
        <span id="de-page-info">-</span>
        <button type="button" id="btn-de-next" disabled>下一頁</button>
        <input type="number" id="de-goto-page" min="1" style="width:50px;padding:2px 4px;font-size:0.85rem" placeholder="#">
        <button type="button" id="btn-de-goto" style="padding:2px 8px;font-size:0.85rem">前往</button>
      </div>
      <div id="de-result" style="margin-top:0.5rem"></div>
    </div>

    <!-- Tab: 伺服器監控 -->
    <div id="tab-monitor" class="tab-panel">
      <p class="ws-status" id="ws-status">⬤ 未連線</p>

      <!-- 靜態硬體資訊列（第一次收到資料後顯示，顯示自機資訊） -->
      <div class="hw-info" id="hw-info" style="display:none">
        <span class="hw-item"><b>CPU 核心</b><span id="hw-cores">—</span></span>
        <span class="hw-item"><b>總記憶體</b><span id="hw-total-mem">—</span></span>
        <span class="hw-item"><b>OS</b><span id="hw-os">—</span></span>
        <span class="hw-item"><b>.NET</b><span id="hw-dotnet">—</span></span>
      </div>

      <!-- 每台 Server 動態生成卡片 -->
      <div id="server-list"></div>

      <div class="chart-box">
        <p style="margin:0 0 6px;font-size:0.82rem;color:#6b7280">CPU 趨勢（所有伺服器，最近 60s）</p>
        <canvas id="metrics-chart"></canvas>
      </div>
    </div>
  </section>

  <script src="js/admin.js"></script>
</body>
</html>
