name: E2E

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
  pull_request:
    branches: [main]
    paths-ignore: []

jobs:
  playwright:
    if: github.event_name != 'pull_request' || github.base_ref == 'main' && github.head_ref == 'uat'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: tests/TaipeiCrimeMap.E2E

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: API smoke test
        run: |
          BASE="${UAT_URL:-https://taipei-crime-map-uat.ambitioussand-7326440b.japaneast.azurecontainerapps.io}"
          echo "=== GET /api/crime/stats ==="
          curl -sf "${BASE}/api/crime/stats" | grep -q '"totalCount"'
          echo "OK"
          echo "=== GET /api/crime/heatmap?caseType=1 ==="
          curl -sf "${BASE}/api/crime/heatmap?caseType=1" | grep -q '\['
          echo "OK"
          echo "=== GET /api/crime/points?caseType=1&district=1 ==="
          curl -sf "${BASE}/api/crime/points?caseType=1&district=1" | grep -q '\['
          echo "OK"
          echo "All smoke tests passed."
        env:
          UAT_URL: ${{ secrets.UAT_URL }}

      - name: Run Playwright tests
        run: npx playwright test
        env:
          UAT_URL: ${{ secrets.UAT_URL }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/TaipeiCrimeMap.E2E/playwright-report/
          retention-days: 14
