name: CI

on:
  push:
    branches: [uat, main]
  pull_request:
    branches: [uat, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: taipeicrimemap.azurecr.io/taipei-crime-map

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: Test1234!Strong
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Test1234!Strong -Q 'SELECT 1' -C"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

      garnet:
        image: ghcr.io/microsoft/garnet:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "bash -c 'echo > /dev/tcp/127.0.0.1/6379'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: "9.0.x"

      - name: Create database
        run: |
          CONTAINER=$(docker ps --filter "ancestor=mcr.microsoft.com/mssql/server:2022-latest" -q)
          docker exec "$CONTAINER" /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P "Test1234!Strong" \
            -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = N'taipei_crime_map') CREATE DATABASE taipei_crime_map" \
            -C

      - name: Restore
        run: dotnet restore TaipeiCrimeMap.slnx

      - name: Build
        run: dotnet build TaipeiCrimeMap.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test TaipeiCrimeMap.slnx --no-restore --configuration Release --logger "console;verbosity=minimal"
        env:
          ConnectionStrings__DefaultConnection: "Server=localhost,1433;Database=taipei_crime_map;User Id=sa;Password=Test1234!Strong;Encrypt=True;TrustServerCertificate=True;"
          ConnectionStrings__Redis: "localhost:6379"

  push-to-acr:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/uat'

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:uat
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Smoke test
        run: |
          IMAGE="${{ env.IMAGE_NAME }}:${{ github.sha }}"

          # Garnet（host network，讓 app 可透過 localhost:6379 連線）
          docker run -d --network host --name smoke-garnet \
            ghcr.io/microsoft/garnet:latest

          # App：Testing env 跳過 DbUpMigrator，dummy DB 字串避免啟動錯誤
          docker run -d --network host --name smoke-app \
            -e ASPNETCORE_ENVIRONMENT=Testing \
            -e ASPNETCORE_URLS=http://+:8080 \
            -e "ConnectionStrings__DefaultConnection=Server=smoke-dummy;Database=smoke;TrustServerCertificate=True;" \
            -e ConnectionStrings__Redis=localhost:6379 \
            "$IMAGE"

          echo "Waiting 10s for startup..."
          sleep 10

          # 容器是否仍在執行（未因啟動錯誤而崩潰）
          if ! docker ps -q --filter "name=smoke-app" | grep -q .; then
            echo "ERROR: Container exited during startup"
            docker logs smoke-app
            docker stop smoke-garnet 2>/dev/null || true
            docker rm smoke-app smoke-garnet 2>/dev/null || true
            exit 1
          fi

          # HTTP probe：任何回應（包含 5xx）代表 app 存活；000 代表無回應
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 http://localhost:8080/api/crime || echo "000")
          echo "HTTP status: $HTTP_CODE"

          docker stop smoke-app smoke-garnet 2>/dev/null || true
          docker rm smoke-app smoke-garnet 2>/dev/null || true

          [ "$HTTP_CODE" != "000" ] || { echo "Smoke test FAILED: no HTTP response"; exit 1; }
          echo "Smoke test passed (HTTP $HTTP_CODE)"

  deploy-to-uat:
    runs-on: ubuntu-latest
    needs: push-to-acr

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: taipeicrimemap
          containerAppName: taipei-crime-map-uat
          resourceGroup: taipei-crime-map-rg
          imageToDeploy: taipeicrimemap.azurecr.io/taipei-crime-map:${{ github.sha }}

      - name: Check migration logs
        run: |
          echo "Waiting 30s for container startup..."
          sleep 30
          echo "=== DbUpMigrator logs ==="
          az containerapp logs show \
            --name taipei-crime-map-uat \
            --resource-group taipei-crime-map-rg \
            --tail 150 \
            --format text 2>&1 \
            | grep -iE "migration|migrate|schemaversion|theft_cases|執行|完成|Error" || true

      - name: Import CSV data
        continue-on-error: true
        run: |
          APP_URL=$(az containerapp show \
            --name taipei-crime-map-uat \
            --resource-group taipei-crime-map-rg \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          BASE_URL="https://${APP_URL}"
          echo "UAT URL: $BASE_URL"

          declare -A FILES
          FILES["residential.csv"]=1
          FILES["car.csv"]=2
          FILES["motorcycle.csv"]=3
          FILES["bicycle.csv"]=4
          FILES["snatching.csv"]=5
          FILES["robbery.csv"]=6

          for FILENAME in "${!FILES[@]}"; do
            CASE_TYPE=${FILES[$FILENAME]}
            echo "Importing $FILENAME (CaseType=$CASE_TYPE)..."
            curl --fail --silent --show-error \
              -X POST "$BASE_URL/api/crime/import" \
              -H "Content-Type: application/json" \
              -d "{\"filePath\":\"/app/data/raw/$FILENAME\",\"caseType\":$CASE_TYPE}"
            echo ""
          done

      - name: Find latest report
        id: find_report
        run: |
          # 優先找本次 commit 新增的報告（git show 只需 HEAD，相容 shallow clone）
          REPORT=$(git show --name-only --format='' HEAD -- 'docs/reports/*.md' | head -1)
          # Fallback：按檔名倒序排（日期前綴 → 字母最大 = 最新）
          if [ -z "$REPORT" ]; then
            REPORT=$(ls docs/reports/*.md 2>/dev/null | sort -r | head -1)
          fi
          if [ -z "$REPORT" ]; then
            echo "content=（無報告檔案）" >> $GITHUB_OUTPUT
          else
            {
              echo "content<<EOF"
              cat "$REPORT"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi

      - name: Send email report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: 任務報告：${{ github.event.head_commit.message }}
          to: chengyi.ks@gmail.com
          from: ${{ secrets.GMAIL_USERNAME }}
          body: ${{ steps.find_report.outputs.content }}
