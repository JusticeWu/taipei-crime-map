name: CI

on:
  push:
    branches: [ uat, main ]
  pull_request:
    branches: [ uat, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore TaipeiCrimeMap.slnx

      - name: Build
        run: dotnet build TaipeiCrimeMap.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test TaipeiCrimeMap.slnx --no-restore --configuration Release --logger "console;verbosity=minimal"